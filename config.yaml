# YOLO Training Configuration

# Dataset paths
path: ./dataset  # root directory
train: images/train  # train images (relative to 'path')
val: images/val  # validation images (relative to 'path')
test: images/test  # test images (relative to 'path')

# Class names (customize for your specific class)
names:
  0: dogNose  # Change this to your target class
# Add more classes if needed:
# 1: car
# 2: dog

# Training hyperparameters
epochs: 100
batch: 16
imgsz: 640
patience: 50  # early stopping patience
save_period: 10  # save checkpoint every N epochs

# Model configuration
model: yolo11n.pt  # options: yolo11n, yolo11s, yolo11m, yolo11l, yolo11x
device: ''  # cuda device, i.e. 0 or 0,1,2,3 or cpu

# Optimization
optimizer: SGD  # optimizer (SGD, Adam, AdamW, RMSProp)
lr0: 0.01  # initial learning rate
lrf: 0.01  # final learning rate factor
momentum: 0.937
weight_decay: 0.0005

# Augmentation
hsv_h: 0.015  # HSV-Hue augmentation
hsv_s: 0.7  # HSV-Saturation augmentation
hsv_v: 0.4  # HSV-Value augmentation
degrees: 8.0  # rotation (+/- deg)
translate: 0.2  # translation (+/- fraction)
scale: 0.9  # stronger zoom in/out for partial-face robustness
shear: 0.0  # shear (+/- deg)
perspective: 0.0005  # light perspective variation
flipud: 0.0  # flip up-down probability
fliplr: 0.5  # flip left-right probability
mosaic: 0.8  # mosaic augmentation probability
mixup: 0.1  # mixup augmentation probability
close_mosaic: 10  # disable mosaic in final epochs for cleaner boxes
multi_scale: 0.2  # random multi-scale ratio (0.0 to <1.0)

# Other settings
verbose: True
save: True
exist_ok: False
pretrained: True
project: runs/train
name: yolo_custom
